<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <H1>Imagem dinâmica</H1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplismente aumente e diminua o tamanho do seu navegador.</p>

        <picture>
            <source media="(max-width: 720px)" srcset="images/foto-p.png" type="image/png">
            <source media="(max-width: 1050px)" srcset="images/foto-m.png" type="image/png">
            <img src="Images/foto-g.png" alt="A imagem flexível funciona">
        </picture>

<h1>Reproduzindo Audio</h1>
        <p>Vamos aprender a reproduzir audio em HTML5</p>
            <audio preload="metadata" autoplay controls loop>
                <source src="midia/happy-mistake.mp3" type="audio/mpeg">
                <source src="midia/happy-mistake.mp3" type="audio/wav">
                <source src="midia/happy-mistake.mp3" type="audio/ogg">
                     
            <p>Infelizmente seu navegador não condegue reproduzir áudio <a href="midia/guanacast-33.mp3">Clique aqui para baixar o arquivo MP3</a></p>
            </audio>
</body>
</html>
